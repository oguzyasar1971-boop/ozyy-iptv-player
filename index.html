<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ozyy TV Player</title>
  
<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #073b6d, #020617 70%);
  color: white;
  font-family: Arial, sans-serif;
}

.login-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.logo {
  text-align: center;
  margin-bottom: 25px;
}

.play-icon {
  width: 90px;
  height: 90px;
  background: linear-gradient(135deg, #06b6d4, #0ea5e9);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-size: 40px;
  box-shadow: 0 0 35px #06b6d4;
}

.logo h1 {
  margin-bottom: 5px;
}

.logo p {
  color: #94a3b8;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

button {
  background: linear-gradient(135deg, #06b6d4, #2563eb);
  color: white;
  border: none;
  padding: 13px 22px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}

.login-box {
  width: 330px;
  background: rgba(15, 23, 42, 0.85);
  border: 1px solid #38bdf8;
  border-radius: 22px;
  padding: 25px;
  box-shadow: 0 0 35px rgba(6, 182, 212, 0.35);
}

.login-box h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 13px;
  margin: 9px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  box-sizing: border-box;
}

.login-box button {
  width: 100%;
  margin-top: 12px;
}

.hidden {
  display: none;
}

.top-menu {
  display: flex;
  justify-content: center;
  gap: 15px;
  padding: 20px;
  background: #020617;
}

#video {
  width: 85%;
  margin: 20px auto;
  display: block;
  border-radius: 15px;
  background: black;
}

#channels {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 20px;
}

.channel {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  cursor: pointer;
}

.channel:hover {
  background: #06b6d4;
}
</style>
  
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
let video;

function showTab(tab) {
  document.getElementById("xtream").classList.add("hidden");
  document.getElementById("m3u").classList.add("hidden");
  document.getElementById("mac").classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");
}

function openApp() {
  document.querySelector(".login-screen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  video = document.getElementById("video");
}

function playStream(url) {
  if (Hls.isSupported()) {
    let hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}

async function loadXtream() {
  let server = document.getElementById("server").value.trim();
  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();

  if (!server || !user || !pass) {
    alert("Server, username ve password yaz");
    return;
  }

  openApp();

  let res = await fetch(`${server}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`);
  let channels = await res.json();

  showChannels(channels.map(ch => ({
    name: ch.name,
    url: `${server}/live/${user}/${pass}/${ch.stream_id}.m3u8`
  })));
}

async function loadM3U() {
  let url = document.getElementById("m3uUrl").value.trim();

  if (!url) {
    alert("M3U URL yaz");
    return;
  }

  openApp();

  let res = await fetch(url);
  let text = await res.text();

  let channels = parseM3U(text);
  showChannels(channels);
}

function parseM3U(data) {
  let lines = data.split("\n");
  let channels = [];

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].startsWith("#EXTINF")) {
      let name = lines[i].split(",")[1] || "Kanal";
      let url = lines[i + 1];

      if (url && url.startsWith("http")) {
        channels.push({ name, url });
      }
    }
  }

  return channels;
}

function showChannels(channels) {
  let container = document.getElementById("channels");
  container.innerHTML = "";

  channels.forEach(ch => {
    let div = document.createElement("div");
    div.className = "channel";
    div.innerText = ch.name;
    div.onclick = () => playStream(ch.url);
    container.appendChild(div);
  });
}
<body>

<div class="login-screen">

  <div class="logo">
    <div class="play-icon">▶</div>
    <h1>Ozyy TV Player</h1>
    <p>Premium IPTV Experience</p>
  </div>

  <div class="tabs">
    <button onclick="showTab('xtream')">Xtream</button>
    <button onclick="showTab('m3u')">M3U</button>
    <button onclick="showTab('mac')">MAC</button>
  </div>

  <div id="xtream" class="login-box">
    <h2>Xtream Codes Login</h2>
    <input id="server" placeholder="Server URL">
    <input id="username" placeholder="Username">
    <input id="password" placeholder="Password" type="password">
    <button onclick="loadXtream()">Giriş Yap</button>
  </div>

  <div id="m3u" class="login-box hidden">
    <h2>M3U Playlist</h2>
    <input id="m3uUrl" placeholder="M3U URL">
    <button onclick="loadM3U()">Playlist Yükle</button>
  </div>

  <div id="mac" class="login-box hidden">
    <h2>MAC Address Login</h2>
    <input id="mac1" placeholder="MAC Address 1">
    <input id="mac2" placeholder="MAC Address 2">
    <input placeholder="Portal URL">
    <button onclick="alert('MAC sistemi sonra backend ile eklenecek')">Devam Et</button>
  </div>

</div>

<div id="app" class="hidden">

  <div class="top-menu">
    <button>LIVE TV</button>
    <button>EPG</button>
    <button>VOD</button>
    <button>SERIES</button>
    <button>FAVORITE</button>
    <button>SETTINGS</button>
  </div>

  <video id="video" controls autoplay></video>

  <div id="channels"></div>

</div>

<script src="app.js"></script>
</body>
</html>
