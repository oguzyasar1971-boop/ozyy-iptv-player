<!DOCTYPE html>
<html>
<head>
<head>
<meta charset="UTF-8">
<title>Ozyy IPTV Player</title>

<link rel="manifest" href="./manifest.json">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
  
<style>
body 
  {
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
}

  header {
  background:#06b6d4;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.menu {
  display:flex;
  justify-content:space-around;
  background:#1e293b;
  padding:10px;
}

.menu div {
  cursor:pointer;
}

.menu div:hover {
  color:#06b6d4;
}

input {
  width:80%;
  padding:10px;
  margin:15px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#06b6d4;
  color:white;
  font-size:16px;
}

video {
  width:100%;
  margin-top:20px;
}video {
  width:100%;
  margin-top:20px;
}

.channels {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
}

.card:hover {
  background:#06b6d4;
}
</style>
</head>

<body>

<header>Ozyy IPTV Player</header>

<input id="m3u" placeholder="M3U link gir">
<br>
<button onclick="loadM3U()">M3U Liste Yükle</button>

<br><br>

<input id="server" placeholder="Xtream Server örn: http://site.com:8080">
<br>
<input id="username" placeholder="Kullanıcı adı">
<br>
<input id="password" placeholder="Şifre" type="password">
<br>
<button onclick="loadXtream()">Xtream Codes Giriş</button>

  <div class="card" onclick="playChannel('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">TRT 1</div>

  <div class="card" onclick="playChannel('https://test-streams.mux.dev/test_001/stream.m3u8')">SHOW TV</div>

  <div class="card" onclick="playChannel('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">ATV</div>

  <div class="card" onclick="playChannel('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">KANAL D</div>

  <div class="card" onclick="playChannel('https://test-streams.mux.dev/test_001/stream.m3u8')">TV8</div>

</div>

<div id="film" style="display:none;">
  <h2>Film bölümü</h2>
</div>

<div id="dizi" style="display:none;">
  <h2>Dizi bölümü</h2>
</div>
<video id="player" controls autoplay></video>

<script>
function playChannel(url){
  const video = document.getElementById("player");

  if(Hls.isSupported()){
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}

function show(type){
  document.getElementById("tv").style.display = "none";
  document.getElementById("film").style.display = "none";
  document.getElementById("dizi").style.display = "none";
  document.getElementById(type).style.display = "block";
}

function parseM3U(text){
  const lines = text.split("\n");
  let channelsHTML = "";

  for(let i=0; i<lines.length; i++){
  if(lines[i].includes("#EXTINF")){
    const name = lines[i].split(",")[1] || "Kanal";
    const link = (lines[i+1] || "").trim();

    if(!link.startsWith("http")) continue;

    channelsHTML += `
      <div class="card" onclick="playChannel('${link}')">
        ${name}
      </div>
    `;
  }
}

  document.getElementById("tv").innerHTML = channelsHTML;
}

async function loadM3U(){
  const url = document.getElementById("m3u").value;
  const res = await fetch(url);
  const text = await res.text();
  parseM3U(text);
}

async function loadM3UFile(){
  const fileInput = document.getElementById("fileInput");
  const file = fileInput.files[0];

  if(!file){
    alert("Dosya seç!");
    return;
  }

  const text = await file.text();
  parseM3U(text);
}
  async function loadXtream(){
  const server = document.getElementById("server").value;
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if(!server || !user || !pass){
    alert("Bilgileri doldur!");
    return;
  }

  try{
    const res = await fetch(`${server}/player_api.php?username=${user}&password=${pass}`);
    const data = await res.json();

    let channelsHTML = "";

    // live channels çekiyoruz
    const liveRes = await fetch(`${server}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`);
    const channels = await liveRes.json();

    for(let ch of channels){
      const link = `${server}/live/${user}/${pass}/${ch.stream_id}.m3u8`;

      channelsHTML += `
        <div class="card" onclick="playChannel('${link}')">
          ${ch.name}
        </div>
      `;
    }

    document.getElementById("tv").innerHTML = channelsHTML;

  }catch(e){
    alert("Bağlantı hatası (CORS olabilir)");
  }
}
</script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
