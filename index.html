<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ozyy IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
}

header {
  background:#06b6d4;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

input {
  width:80%;
  padding:10px;
  margin:15px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#06b6d4;
  color:white;
  font-size:16px;
}

video {
  width:100%;
  margin-top:20px;
}video {
  width:100%;
  margin-top:20px;
}

.channels {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
}

.card:hover {
  background:#06b6d4;
}
</style>
</head>

<body>

<header>Ozyy IPTV Player</header>

<input id="m3u" placeholder="M3U link gir">
<br>
<button onclick="play()">Yayın Aç</button>
<br><br>
<br><br>

<button onclick="playChannel('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">Kanal 1</button>

<button onclick="playChannel('https://test-streams.mux.dev/test_001/stream.m3u8')">Kanal 2</button>

<button onclick="playChannel('https://test-streams.mux.dev/bbb-360p.m3u8')">Kanal 3</button>
<button onclick="playChannel('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">Test Kanal</button>
<video id="player" controls autoplay></video>

<script>
function play(){
  const url = document.getElementById("m3u").value;
  const video = document.getElementById("player");

  if(Hls.isSupported()){
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}function playChannel(url){
  const video = document.getElementById("player");

  if(Hls.isSupported()){
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}
</script>

</body>
</html>
